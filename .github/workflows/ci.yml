name: ci

on:
  push:
    branches:
      - main
      - staging
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - staging
      - develop
      - 'feature/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup node env 🏗
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install

      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: pnpm exec commitlint --from HEAD~1 --to HEAD --verbose

      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "${BASE_SHA}" --to "${HEAD_SHA}" --verbose

  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup node env 🏗
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile

      - name: Cache integration images
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/website/public/img/integrations
          key: ${{ runner.os }}-integration-images-${{ hashFiles('packages/website/public/integrations/all.json') }}

      - name: Setup Go (for e2e — backend serves the app)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/website

      - name: Run linter 👀
        run: pnpm run lint:all

      - name: Build 🚧
        run: pnpm run build

      - name: Run tests with coverage ✅
        run: pnpm run coverage

      - name: Upload frontend coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          directory: packages/website/coverage
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Set .env
        run: cp .env.test .env
        working-directory: packages/website

      - name: Run e2e tests 🧪
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: packages/website/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: e2e-test-results
          path: packages/website/tests/e2e/test-results/
          retention-days: 7

  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Run tests with coverage
        run: make coverage

      - name: Upload backend coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: backend/coverage.out
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          working-directory: backend

  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup node env 🏗
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --frozen-lockfile

      - name: Generate static site 🏗
        # Build against the production base URL so canonical/og:url are absolute
        # and SEO scores reflect the deployed site (not a baseUrl='' artifact).
        env:
          NUXT_PUBLIC_BASE_URL: https://rotki.com
        run: pnpm --filter @rotki/website generate

      # Guard 1: pre-render / SEO integrity (deterministic, never flakes)
      # Keep PAGES in sync with the "url" list in lighthouserc.json.
      - name: Assert pre-rendered HTML
        continue-on-error: true
        run: |
          set -euo pipefail
          dir=packages/website/.output/public
          pages="index.html products/index.html integrations/aave/index.html"
          fail=0
          for p in $pages; do
            f="$dir/$p"
            if [ ! -f "$f" ]; then
              echo "⚠️ $p: file not generated" >> "$GITHUB_STEP_SUMMARY"; fail=1; continue
            fi
            grep -qE '<div id="__nuxt"></div>' "$f" && { echo "⚠️ $p: empty __nuxt shell (prerender broke)" >> "$GITHUB_STEP_SUMMARY"; fail=1; }
            grep -q '<title>' "$f" || { echo "⚠️ $p: missing <title>" >> "$GITHUB_STEP_SUMMARY"; fail=1; }
            grep -q 'name="description"' "$f" || { echo "⚠️ $p: missing meta description" >> "$GITHUB_STEP_SUMMARY"; fail=1; }
          done
          [ "$fail" = 0 ] && echo "✅ pre-render/SEO checks passed ($pages)" >> "$GITHUB_STEP_SUMMARY" || true

      # Guard 1b: comprehensive SEO audit over ALL generated pages (deterministic).
      # Writes a per-issue table to the job summary. Report-only (no --strict).
      - name: SEO audit (all pages)
        continue-on-error: true
        run: pnpm --filter @rotki/website seo:audit

      # Guard 2: Lighthouse (report-only — serves the generated files itself)
      - name: Run Lighthouse CI
        continue-on-error: true
        run: npx -y @lhci/cli@0.15.1 autorun --config=./lighthouserc.json

      - name: Summarize Lighthouse scores
        if: always()
        continue-on-error: true
        run: |
          node <<'EOF' | tee -a "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs');
          const path = '.lighthouseci/manifest.json';
          if (!fs.existsSync(path)) {
            console.log('## 🔦 Lighthouse\n\n_No report produced (collection failed — see job log)._');
            process.exit(0);
          }
          const runs = JSON.parse(fs.readFileSync(path, 'utf8'));
          // One representative (median) run per sampled URL.
          const reps = runs.filter(r => r.isRepresentativeRun);
          const perUrl = reps.length || 1;
          const runsPerUrl = Math.round(runs.length / perUrl);
          const pct = v => `${Math.round(v * 100)}`;
          let bench;
          const rows = reps.map((r) => {
            const s = r.summary;
            let lcp = '-', tbt = '-', cls = '-';
            try {
              const lhr = JSON.parse(fs.readFileSync(r.jsonPath, 'utf8'));
              const a = lhr.audits;
              lcp = `${(a['largest-contentful-paint'].numericValue / 1000).toFixed(2)} s`;
              tbt = `${Math.round(a['total-blocking-time'].numericValue)} ms`;
              cls = a['cumulative-layout-shift'].numericValue.toFixed(3);
              bench = bench ?? Math.round(lhr.environment.benchmarkIndex);
            } catch {}
            let page = r.url;
            try { page = new URL(r.url).pathname; } catch {}
            return `| \`${page}\` | ${pct(s.performance)} | ${pct(s.accessibility)} | ${pct(s['best-practices'])} | ${pct(s.seo)} | ${lcp} | ${tbt} | ${cls} |`;
          });
          console.log('## 🔦 Lighthouse (report-only)\n');
          console.log('| Page | Perf | A11y | BP | SEO | LCP | TBT | CLS |');
          console.log('| --- | --- | --- | --- | --- | --- | --- | --- |');
          rows.forEach(r => console.log(r));
          if (bench !== undefined)
            console.log(`\n_CPU benchmarkIndex: ${bench} — higher is a faster/less-contended runner; low values (≈2000) mean the run was slow and scores read pessimistically._`);
          console.log(`\n_Median of ${runsPerUrl} run(s) per page._`);
          EOF

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
          if-no-files-found: ignore
          include-hidden-files: true

  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: false
          tags: rotki/frontend:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
