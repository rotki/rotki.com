saveExact: true
shamefullyHoist: true
shellEmulator: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@rotki/ui-library'
  # Renovate security update: vite@7.3.5
  - vite@7.3.5
blockExoticSubdeps: true
strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
  - undici-types@6.19.8
  - '@noble/curves@1.8.0'
  - '@noble/hashes@1.7.0'
  - slow-redact@0.3.2
  - synckit@0.9.3
  - tailwind-merge@2.6.1

overrides:
  chokidar: 5.0.0

allowBuilds:
  '@parcel/watcher': true
  '@reown/appkit': false
  better-sqlite3: true
  bufferutil: true
  esbuild: true
  msw: false
  sharp: false
  utf-8-validate: true
  vue-demi: false

packages:
  - .
  - packages/*
  - packages/website/tests/e2e/mock-api

catalog:
  '@fontsource/roboto': 5.2.10
  '@rotki/ui-library': 2.21.0
  '@types/braintree-web': 3.96.17
  '@types/node': 24.12.4
  '@tsconfig/node24': 24.0.4
  '@unhead/vue': 2.1.15
  '@vitejs/plugin-vue': 6.0.7
  '@vue/tsconfig': 0.9.1
  '@vueuse/core': 14.3.0
  '@vueuse/math': 14.3.0
  '@vueuse/nuxt': 14.3.0
  '@vueuse/shared': 14.3.0
  autoprefixer: 10.5.0
  braintree-web: 3.142.0
  postcss: 8.5.15
  tailwindcss: 3.4.19
  typescript: 6.0.3
  vite: 7.3.5
  vite-ssg: 28.3.0
  vue: 3.5.34
  vue-tsc: 3.3.1
  zod: 3.25.76

patchedDependencies:
  '@nuxt/vite-builder@4.4.6': patches/@nuxt__vite-builder@4.4.6.patch
