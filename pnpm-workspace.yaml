saveExact: true
shellEmulator: true
minimumReleaseAge: 10080
blockExoticSubdeps: true
strictDepBuilds: true
trustPolicy: no-downgrade

allowBuilds:
  '@parcel/watcher': true
  '@reown/appkit': false
  better-sqlite3: true
  bufferutil: true
  esbuild: true
  msw: false
  sharp: false
  utf-8-validate: true
  vue-demi: false

packages:
  - .
  - packages/*
  - packages/website/tests/e2e/mock-api

catalog:
  '@fontsource/roboto': 5.2.10
  '@rotki/ui-library': 2.15.0
  '@types/braintree-web': 3.96.17
  '@types/node': 24.12.0
  '@tsconfig/node24': 24.0.4
  '@unhead/vue': 2.1.12
  '@vitejs/plugin-vue': 6.0.5
  '@vue/tsconfig': 0.9.1
  '@vueuse/core': 14.2.1
  '@vueuse/math': 14.2.1
  '@vueuse/nuxt': 14.2.1
  '@vueuse/shared': 14.2.1
  autoprefixer: 10.4.27
  braintree-web: 3.138.0
  postcss: 8.5.8
  tailwindcss: 3.4.19
  typescript: 5.9.3
  vite: 7.3.1
  vite-ssg: 28.3.0
  vue: 3.5.31
  vue-tsc: 3.2.6
  zod: 3.25.76
