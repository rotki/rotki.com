saveExact: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@rotki/eslint-config'
  - '@rotki/eslint-plugin'
  - '@rotki/ui-library'
shamefullyHoist: true
shellEmulator: true
blockExoticSubdeps: true
strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
  - undici-types@6.19.8
  - '@noble/curves@1.8.0'
  - '@noble/hashes@1.7.0'
  - slow-redact@0.3.2
  - synckit@0.9.3
  - tailwind-merge@2.6.1

packages:
  - .
  - packages/*
  - packages/website/tests/e2e/mock-api

overrides:
  chokidar: 5.0.0

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  bufferutil: true
  esbuild: true
  msw: false
  sharp: false
  utf-8-validate: true
  vue-demi: false

